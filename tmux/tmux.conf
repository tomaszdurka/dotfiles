# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------

# Use Ctrl-a as prefix (easier to reach than default Ctrl-b).
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config with prefix + r.
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Start window / pane numbering at 1; renumber windows when one is closed.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Bigger scrollback.
set -g history-limit 100000

# Snappier command sequences (default 500ms feels laggy in vim).
set -sg escape-time 10

# Report focus events to running programs (nvim, editors that care).
set -g focus-events on

# Let apps use OSC 52, images, etc. through tmux.
set -g allow-passthrough on

# Enable mouse (scroll, resize panes, select panes).
set -g mouse on

# -----------------------------------------------------------------------------
# Colors / terminal (Ghostty-friendly)
# -----------------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-ghostty:Tc"

# -----------------------------------------------------------------------------
# Panes
# -----------------------------------------------------------------------------

# Split panes with | and -, keeping the current pane's cwd.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in cwd of current pane.
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resize (repeatable with -r).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -----------------------------------------------------------------------------
# Copy mode (vi-style)
# -----------------------------------------------------------------------------

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# -----------------------------------------------------------------------------
# Session switcher (fzf-based, via bin/tmux-sessionizer)
# -----------------------------------------------------------------------------

# prefix + f -> pick a project directory and jump into (or create) a session.
bind f display-popup -E -w 80% -h 60% "tmux-sessionizer"

# prefix + s already lists sessions; prefix + w lists windows across sessions.

# -----------------------------------------------------------------------------
# Status bar
# -----------------------------------------------------------------------------

set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=white"
set -g status-left  "#[fg=green,bold] #S "
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M "
set -g status-left-length 30
set -g status-right-length 60

setw -g window-status-current-style "fg=black,bg=green,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# -----------------------------------------------------------------------------
# Plugins (tpm)
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Restore automatically on tmux server start.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Keep tpm as the last line.
run '~/.tmux/plugins/tpm/tpm'
